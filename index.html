<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PUMP // LAB</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 font-sans min-h-screen flex justify-center">

  <div class="w-full max-w-md bg-slate-900 border-x border-slate-800 flex flex-col min-h-screen">
    <!-- Header -->
    <header class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900/80 sticky top-0">
      <h1 class="text-xl font-extrabold tracking-wider text-emerald-400">PUMP // LAB</h1>
      <span class="text-xs bg-slate-800 text-slate-400 px-2.5 py-1 rounded-full font-mono">v0.1</span>
    </header>

    <!-- Contenuto -->
    <main class="flex-1 p-4 space-y-4">
      
      <!-- Box Scheda Allenamento -->
      <div class="p-4 bg-slate-800/50 border border-slate-700/50 rounded-2xl space-y-3">
        <div class="flex justify-between items-center">
          <h2 class="font-bold text-lg text-white">Sessione Oggi</h2>
          <span class="text-xs bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 px-2 py-0.5 rounded">Petto & Spalle</span>
        </div>

        <!-- Esercizio Esempio -->
        <div class="p-3 bg-slate-900 rounded-xl border border-slate-800 space-y-2">
          <div class="flex justify-between font-semibold text-sm">
            <span>Panca Piana con Bilanciere</span>
            <span class="text-slate-400">3 x 8-10</span>
          </div>
          
          <!-- Pulsante Alternative Esercizio -->
          <button onclick="alert('Alternative: Dips parallele / Distensioni Manubri')" class="text-xs text-emerald-400 underline decoration-dashed">
            🔄 Vedi alternative esercizio
          </button>
        </div>

        <!-- Timer di Recupero Integrato -->
        <div class="p-4 bg-slate-900 rounded-xl border border-slate-800 text-center space-y-2">
          <span class="text-xs font-mono text-slate-400 uppercase tracking-widest">Timer Recupero</span>
          <div id="timer-display" class="text-4xl font-extrabold font-mono text-emerald-400">01:30</div>
          <div class="flex gap-2 justify-center pt-1">
            <button onclick="startTimer(90)" class="px-4 py-2 bg-emerald-500 hover:bg-emerald-600 text-slate-950 font-bold text-xs rounded-lg transition">AVVIA 90s</button>
            <button onclick="resetTimer()" class="px-4 py-2 bg-slate-800 text-slate-300 text-xs font-medium rounded-lg">RESET</button>
          </div>
        </div>
      </div>

    </main>

    <!-- Navigation Bar In Basso -->
    <nav class="border-t border-slate-800 bg-slate-900 p-3 flex justify-around text-xs font-bold">
      <button class="text-emerald-400">WORKOUT</button>
      <button class="text-slate-500">STORICO</button>
      <button class="text-slate-500">AGENTE IA</button>
    </nav>
  </div>

  <script>
    let timerInterval;
    function startTimer(seconds) {
      clearInterval(timerInterval);
      let timeLeft = seconds;
      const display = document.getElementById('timer-display');
      
      timerInterval = setInterval(() => {
        const mins = Math.floor(timeLeft / 60);
        const secs = timeLeft % 60;
        display.textContent = `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        
        if (timeLeft <= 0) {
          clearInterval(timerInterval);
          display.textContent = "RECUPERO COMPLETATO!";
        }
        timeLeft--;
      }, 1000);
    }

    function resetTimer() {
      clearInterval(timerInterval);
      document.getElementById('timer-display').textContent = "01:30";
    }
  </script>
</body>
</html>
